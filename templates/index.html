<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<form method="POST">
    <input type="text" name="note" placeholder="Enter your note">
    <button type="submit">Add Note</button>
</form>

<h2>Notes</h2>

<ul>
{% for note in notes %}
    <li>
        {{ note[1] }}
        <a href="/delete/{{ note[0] }}">Delete</a>
    </li>
{% endfor %}
</ul>

</body>
</html>
